<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📍</text></svg>">
  <title>A Red Thread</title>

  <!-- Describe your page — shows up in search results and browser tabs -->
  <meta name="description" content="A short description of your page goes here.">

  <!-- Your styles -->
  <link rel="stylesheet" href="styles.css">

   <!-- loading in fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400..700&family=Patrick+Hand&display=swap" rel="stylesheet">
  <style>
  body {
    font-family: "Patrick Hand", cursive;
  }
  </style>
  
  <style>
    /* Keyboard users need to see where focus is */
    :focus-visible {
      outline: 2px solid currentColor;
      outline-offset: 2px;
    }

    /* Respect users who prefer less motion */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        transition-duration: 0.01ms !important;
      }
    }

    /* =============================================
       Code re-used from humble abode website (this part was originally made using AI)
       ============================================= */

        /* =============================================
       IMAGE POSITIONING SYSTEM
       How it works:
       - .img-layer is a fixed container covering the
         full screen, anchored to the TOP-LEFT corner.
       - Each .img-item is positioned relative to that
         top-left corner using:
             top:   distance DOWN  from top of screen
             left: distance LEFT  from left of screen
       - Change width/height on each .img-item to scale.
       - Set pointer-events: none on non-clickable images.
       ============================================= */

    .img-layer {
      position: fixed;
      top: 7vh;
      left: 50vw;      /* ----------------------------------- */
      width: 0;
      height: 0;
      pointer-events: none; /* layer itself doesn't block clicks */
      z-index: 10;          /* sits above page content; lower if needed */
    }

    .img-item {
      position: absolute;
      display: block;
      overflow: hidden;
    }

    .img-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /* Non-clickable images */
    .img-item.static {
      pointer-events: none;
    }

    /* Clickable images */
    .img-item.clickable {               
      pointer-events: auto;
      cursor: pointer;
      transition: opacity 0.2s ease, transform 0.2s ease;        
    }

    .img-item.clickable:hover {  /* what image looks like when hovering over */
      opacity: 1;
      transform: scale(1.03);
    }

    #arrow1{
      width: 5vw;  
      translate: 0.5vw 37vw; 
    }
    #star{
      width: 5vw;  
      translate: 0.5vw 30vw; 
    }



  </style>
</head>
<body>
  <header>
    <h1 class="title">a red thread</h1>
  </header>


  <div class="img-layer" aria-hidden="true">

  <div id="arrow1" class="img-item static">
    <img
      src="images/arrow-1.png"
      alt="a red arrow pointing up"
    >
  </div>
  
  <div id="star" class="img-item static">
    <img
      src="images/star.png"
      alt="a red star"
    >
  </div>



  <footer>
    <div class="copyright">  &copy; <span id="year"></span> </div>
    <div class="name"> Anouk Froitzheim </div>
  </footer>

  <script>
    // Keep the copyright year current automatically
    document.getElementById('year').textContent = new Date().getFullYear();

  </script>

  <!-- Your scripts -->
  <script src="script.js"></script>

</body>
</html>
