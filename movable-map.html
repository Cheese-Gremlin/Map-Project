<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Movable Map</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0e0e10;
    font-family: 'Courier New', monospace;
    overflow: hidden;
    width: 100vw;
    height: 100vh;
  }

  #viewport {
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    cursor: grab;
    position: relative;
  }

  #viewport.dragging { cursor: grabbing; }

  /* The world — this div gets transformed to pan */
  #world {
    position: absolute;
    top: 0; left: 0;
    width: 0; height: 0;
    /* children use absolute positioning in world coords */
  }

  /* Grid background attached to viewport, not world */
  #grid-bg {
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 0;
  }

  /* ── Map items ── */
  .map-item {
    position: absolute;
    transform: translate(-50%, -50%);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    pointer-events: none; /* default off; clickable ones override */
  }

  .map-item.clickable { pointer-events: auto; cursor: pointer; }

  .marker {
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    transition: transform 0.15s ease, box-shadow 0.15s ease;
    position: relative;
  }

  .map-item.clickable .marker:hover {
    transform: scale(1.15);
  }

  .map-item.selected .marker {
    box-shadow: 0 0 0 4px rgba(255,255,255,0.25), 0 0 20px currentColor;
  }

  .map-item label {
    color: rgba(255,255,255,0.75);
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    white-space: nowrap;
    pointer-events: none;
    text-shadow: 0 1px 4px rgba(0,0,0,0.8);
  }

  /* ── HUD ── */
  #hud {
    position: fixed;
    top: 16px; left: 16px;
    z-index: 100;
    display: flex;
    flex-direction: column;
    gap: 8px;
    pointer-events: none;
  }

  .hud-pill {
    background: rgba(20,20,24,0.85);
    border: 1px solid rgba(255,255,255,0.1);
    color: rgba(255,255,255,0.5);
    font-family: 'Courier New', monospace;
    font-size: 11px;
    padding: 5px 10px;
    border-radius: 4px;
    letter-spacing: 0.05em;
  }

  #selected-info {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(20,20,24,0.92);
    border: 1px solid rgba(255,255,255,0.15);
    color: #fff;
    font-family: 'Courier New', monospace;
    font-size: 12px;
    padding: 8px 18px;
    border-radius: 6px;
    letter-spacing: 0.05em;
    z-index: 100;
    opacity: 0;
    transition: opacity 0.2s;
    pointer-events: none;
  }

  #selected-info.visible { opacity: 1; }

  /* Instructions */
  #instructions {
    position: fixed;
    bottom: 20px; right: 20px;
    color: rgba(255,255,255,0.25);
    font-family: 'Courier New', monospace;
    font-size: 10px;
    letter-spacing: 0.06em;
    line-height: 1.8;
    text-align: right;
    pointer-events: none;
  }
</style>
</head>
<body>

<div id="viewport">
  <canvas id="grid-bg"></canvas>

  <!-- THE WORLD: everything inside here is in world coordinates -->
  <div id="world">

    <!-- Non-clickable decoration -->
    <div class="map-item" style="left: 60px; top: -480px;">
      <div class="marker" style="width:28px;height:28px;background:#3a3a4a;color:#888;border:1px solid #555;">🗼</div>
      <label>Watchtower</label>
    </div>

    <div class="map-item" style="left: -80px; top: -220px;">
      <div class="marker" style="width:24px;height:24px;background:#1a2a1a;color:#4a8a4a;border:1px solid #2a5a2a;">〰</div>
      <label>River</label>
    </div>

    <!-- Clickable items -->
    <div class="map-item clickable" data-name="Home Base" data-desc="Your starting point. All roads lead here." style="left: 0px; top: -300px;">
      <div class="marker" style="width:44px;height:44px;background:#0e3d2a;color:#1D9E75;border:2px solid #1D9E75;">🏠</div>
      <label>Home Base</label>
    </div>

    <div class="map-item clickable" data-name="Forest Camp" data-desc="A hidden camp deep in the eastern woods." style="left: 180px; top: -120px;">
      <div class="marker" style="width:36px;height:36px;background:#0e1e3a;color:#4a9ade;border:2px solid #185FA5;">⛺</div>
      <label>Forest Camp</label>
    </div>

    <div class="map-item clickable" data-name="The Mine" data-desc="Rich in ore. Watch out for cave-ins." style="left: -160px; top: -80px;">
      <div class="marker" style="width:36px;height:36px;background:#2a1a00;color:#d4a020;border:2px solid #BA7517;">⛏️</div>
      <label>The Mine</label>
    </div>

    <div class="map-item clickable" data-name="Ancient Ruins" data-desc="No one knows who built this. Explore carefully." style="left: -240px; top: -400px;">
      <div class="marker" style="width:36px;height:36px;background:#2a0e1a;color:#c060a0;border:2px solid #993556;">🏛️</div>
      <label>Ancient Ruins</label>
    </div>

    <div class="map-item clickable" data-name="Market Town" data-desc="Trade goods and gather information here." style="left: 300px; top: -320px;">
      <div class="marker" style="width:36px;height:36px;background:#1a1000;color:#e0a030;border:2px solid #BA7517;">🏪</div>
      <label>Market Town</label>
    </div>

  </div>
</div>

<!-- HUD -->
<div id="hud">
  <div class="hud-pill" id="coords">WORLD  0, 0</div>
</div>

<div id="selected-info"></div>

<div id="instructions">
  DRAG to pan<br>
  CLICK markers to inspect
</div>

<script>
const viewport = document.getElementById('viewport');
const world    = document.getElementById('world');
const gridCanvas = document.getElementById('grid-bg');
const coordsEl  = document.getElementById('coords');
const selInfo   = document.getElementById('selected-info');
const ctx = gridCanvas.getContext('2d');

// ── State ──
let offsetX = 0, offsetY = 0;
let dragStartX = 0, dragStartY = 0;
let startOffX = 0, startOffY = 0;
let isDragging = false;
let selected = null;
const THRESHOLD = 5;

// ── Init: start at bottom-centre ──
function init() {
  resizeGrid();
  // Bottom-centre: world origin sits at bottom-centre of viewport
  offsetX = window.innerWidth / 2;
  offsetY = window.innerHeight;
  applyTransform();
}

// Apply the current offset to the world div
function applyTransform() {
  world.style.transform = `translate(${offsetX}px, ${offsetY}px)`;
  coordsEl.textContent = `WORLD  ${Math.round(-offsetX + window.innerWidth/2)}, ${Math.round(-offsetY + window.innerHeight)}`;
  drawGrid();
}

// ── Grid ──
function resizeGrid() {
  gridCanvas.width  = window.innerWidth;
  gridCanvas.height = window.innerHeight;
  drawGrid();
}

function drawGrid() {
  const w = gridCanvas.width, h = gridCanvas.height;
  const spacing = 60;
  ctx.clearRect(0, 0, w, h);
  ctx.strokeStyle = 'rgba(255,255,255,0.04)';
  ctx.lineWidth = 1;

  // Offset the grid so it scrolls with the world
  const ox = ((offsetX % spacing) + spacing) % spacing;
  const oy = ((offsetY % spacing) + spacing) % spacing;

  for (let x = ox; x < w; x += spacing) {
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, h); ctx.stroke();
  }
  for (let y = oy; y < h; y += spacing) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(w, y); ctx.stroke();
  }

  // Origin crosshair
  const cx = offsetX, cy = offsetY;
  if (cx > 0 && cx < w && cy > 0 && cy < h) {
    ctx.strokeStyle = 'rgba(255,255,255,0.12)';
    ctx.setLineDash([4, 6]);
    ctx.beginPath(); ctx.moveTo(cx - 24, cy); ctx.lineTo(cx + 24, cy); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(cx, cy - 24); ctx.lineTo(cx, cy + 24); ctx.stroke();
    ctx.setLineDash([]);
  }
}

// ── Drag ──
viewport.addEventListener('mousedown', e => {
  if (e.button !== 0) return;
  dragStartX = e.clientX;
  dragStartY = e.clientY;
  startOffX  = offsetX;
  startOffY  = offsetY;
  isDragging = false;
  viewport.classList.add('dragging');
});

window.addEventListener('mousemove', e => {
  if (!(e.buttons & 1)) return;
  const dx = e.clientX - dragStartX;
  const dy = e.clientY - dragStartY;
  if (!isDragging && (Math.abs(dx) > THRESHOLD || Math.abs(dy) > THRESHOLD)) {
    isDragging = true;
  }
  if (isDragging) {
    offsetX = startOffX + dx;
    offsetY = startOffY + dy;
    applyTransform();
  }
});

window.addEventListener('mouseup', () => {
  viewport.classList.remove('dragging');
});

// ── Click on items ──
document.querySelectorAll('.map-item.clickable').forEach(item => {
  item.addEventListener('click', e => {
    if (isDragging) return; // suppress if drag just ended

    const name = item.dataset.name;
    const desc = item.dataset.desc;

    if (selected === item) {
      // Deselect
      item.classList.remove('selected');
      selected = null;
      selInfo.classList.remove('visible');
    } else {
      if (selected) selected.classList.remove('selected');
      selected = item;
      item.classList.add('selected');
      selInfo.textContent = `${name} — ${desc}`;
      selInfo.classList.add('visible');
    }

    e.stopPropagation(); // don't bubble to viewport
  });
});

// Click on empty space — deselect
viewport.addEventListener('click', () => {
  if (isDragging) return;
  if (selected) {
    selected.classList.remove('selected');
    selected = null;
    selInfo.classList.remove('visible');
  }
});

window.addEventListener('resize', () => { resizeGrid(); });

init();
</script>
</body>
</html>
